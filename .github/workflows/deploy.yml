name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Деплой на сервер
    runs-on: ubuntu-latest
    needs: []  # Запускаем независимо, но только после успешного CI

    steps:
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /opt/kartochka

            # Получить последний код
            git pull origin main

            # Обновить зависимости (только prod)
            /root/.local/bin/poetry install --only main --no-interaction

            # Применить миграции
            /root/.local/bin/poetry run alembic upgrade head

            # Перезапустить сервис
            systemctl restart kartochka

            # Проверить что сервис запустился
            sleep 3
            systemctl is-active kartochka
