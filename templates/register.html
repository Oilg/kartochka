<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — Карточка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>🃏 Карточка</h1>
        <p>Создайте аккаунт бесплатно</p>
      </div>

      <div id="error-alert" class="alert alert-danger" style="display:none;"></div>
      <div id="success-alert" class="alert alert-success" style="display:none;"></div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label">Имя (необязательно)</label>
          <input type="text" class="form-control" id="full_name" name="full_name"
                 placeholder="Иван Иванов" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Минимум 8 символов" required autocomplete="new-password" minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="submit-btn">
          Зарегистрироваться
        </button>
      </form>

      <p style="text-align:center; margin-top:16px; color: var(--secondary);">
        Уже есть аккаунт? <a href="/login">Войдите</a>
      </p>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    if (API.isLoggedIn()) window.location = '/dashboard';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorAlert = document.getElementById('error-alert');
      const successAlert = document.getElementById('success-alert');
      btn.disabled = true;
      btn.textContent = 'Регистрация...';
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';

      const payload = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      };
      const fullName = document.getElementById('full_name').value.trim();
      if (fullName) payload.full_name = fullName;

      try {
        const resp = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (resp.ok) {
          successAlert.textContent = 'Аккаунт создан! Перенаправление на вход...';
          successAlert.style.display = 'block';
          setTimeout(() => { window.location = '/login'; }, 1500);
        } else {
          const msg = data?.message || data?.detail?.message || 'Ошибка регистрации';
          errorAlert.textContent = msg;
          errorAlert.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Зарегистрироваться';
        }
      } catch (err) {
        errorAlert.textContent = 'Ошибка соединения. Попробуйте снова.';
        errorAlert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Зарегистрироваться';
      }
    });
  </script>
</body>
</html>
